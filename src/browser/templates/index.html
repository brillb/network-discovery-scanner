{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 4rem auto; text-align: center;">
    <div style="margin-bottom: 2rem;">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="width: 48px; height: 48px; color: var(--primary-accent); margin: 0 auto;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0v3.75C20.25 19.853 16.556 21.75 12 21.75s-8.25-1.847-8.25-4.125v-3.75"></path>
        </svg>
        <h2 style="margin-top: 1rem; margin-bottom: 0.5rem;">Select Discovery Database</h2>
        <p class="text-muted">Evidence directory: <span class="mono">{{ directory }}</span></p>
    </div>

    {% if databases %}
        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            {% for db in databases %}
                <a href="{{ url_for('view_db', dbname=db.key) }}" style="text-decoration: none;">
                    <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--surface-border); border-radius: 8px; padding: 1rem; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s;">
                        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.25rem;">
                            <span style="font-weight: 500; display: flex; align-items: center; gap: 0.75rem; color: var(--text-main);">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:20px; color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                                {{ db.label }}
                            </span>
                            <span class="mono text-muted" style="font-size: 0.75rem;">{{ db.description }}</span>
                        </div>
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:20px; color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"></path></svg>
                    </div>
                </a>
            {% endfor %}
        </div>
        <style>
            a > div:hover {
                background: rgba(59, 130, 246, 0.1) !important;
                border-color: rgba(59, 130, 246, 0.3) !important;
                transform: translateY(-2px);
            }
        </style>
    {% else %}
        <div style="padding: 2rem; background: rgba(244, 63, 94, 0.1); border: 1px dashed rgba(244, 63, 94, 0.4); border-radius: 8px;">
            <p style="color: #fb7185;">No configured database source is available.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
